<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รู้เสี่ยง รีบแจ้ง - ระบบแจ้งความเสี่ยง</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Sarabun', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#fef2f2',
                            100: '#fee2e2',
                            500: '#ef4444',
                            600: '#dc2626',
                            700: '#b91c1c',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f3f4f6;
        }
        input[type="file"]::file-selector-button {
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            border: none;
            background-color: #fee2e2;
            color: #dc2626;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        input[type="file"]::file-selector-button:hover {
            background-color: #fecaca;
        }
        .toast-message {
            transition: opacity 0.3s ease-in-out;
        }
        /* Custom Scrollbar for Dropdown */
        .dropdown-list::-webkit-scrollbar {
            width: 6px;
        }
        .dropdown-list::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 4px;
        }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen pb-12">

    <header class="bg-brand-600 text-white shadow-md sticky top-0 z-10">
        <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
                <h1 class="text-2xl font-bold tracking-wide">รู้เสี่ยง รีบแจ้ง</h1>
            </div>
            <p class="text-brand-100 hidden sm:block text-sm">ระบบรายงานความเสี่ยงและความไม่ปลอดภัย</p>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 mt-8">
        
        <!-- Tab Navigation -->
        <div class="flex space-x-1 mb-6 bg-white p-1 rounded-lg shadow-sm">
            <button id="tab-form" onclick="switchTab('form')" class="flex-1 py-2 px-4 rounded-md font-medium text-brand-600 bg-brand-50 transition-colors duration-200 flex items-center justify-center space-x-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                <span>ลงข้อมูลแจ้งเหตุ</span>
            </button>
            <button id="tab-list" onclick="switchTab('list')" class="flex-1 py-2 px-4 rounded-md font-medium text-gray-500 hover:text-gray-700 hover:bg-gray-50 transition-colors duration-200 flex items-center justify-center space-x-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                <span>รายการที่แจ้งแล้ว</span>
            </button>
        </div>

        <!-- Section: Form -->
        <div id="section-form" class="bg-white rounded-xl shadow-md overflow-visible">
            <div class="p-6 sm:p-8">
                <h2 id="formTitle" class="text-xl font-semibold mb-6 text-gray-800 border-b pb-2 border-gray-200 flex items-center">
                    <svg class="w-6 h-6 mr-2 text-brand-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    รายละเอียดการแจ้งเหตุ
                </h2>
                
                <form id="riskForm" onsubmit="submitForm(event)" class="space-y-6">
                    <input type="hidden" id="editReportId" value="">
                    
                    <!-- Section 1: Reporter Info -->
                    <div class="bg-gray-50 p-4 rounded-lg border border-gray-100">
                        <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-4">ข้อมูลผู้แจ้ง</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label for="reporterName" class="block text-sm font-medium text-gray-700 mb-1">ชื่อ-นามสกุลผู้แจ้ง <span class="text-red-500">*</span></label>
                                <input type="text" id="reporterName" required placeholder="นายตัวอย่าง ใจดี"
                                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-brand-500 focus:border-brand-500 outline-none transition-shadow">
                            </div>
                            <div>
                                <label for="employeeId" class="block text-sm font-medium text-gray-700 mb-1">รหัสพนักงาน <span class="text-red-500">*</span></label>
                                <input type="text" id="employeeId" required placeholder="012345"
                                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-brand-500 focus:border-brand-500 outline-none transition-shadow">
                            </div>
                            
                            <!-- แผนก (Autocomplete) -->
                            <div class="relative">
                                <label for="department" class="block text-sm font-medium text-gray-700 mb-1">แผนก <span class="text-red-500">*</span></label>
                                <input type="text" id="department" required placeholder="พิมพ์ค้นหา หรือ ระบุเอง..."
                                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-brand-500 focus:border-brand-500 outline-none pr-10"
                                    autocomplete="off" oninput="filterOptions('department')" onfocus="showOptions('department')">
                                <ul id="list-department" class="dropdown-list absolute z-20 w-full bg-white border border-gray-200 rounded-md shadow-lg max-h-48 overflow-y-auto hidden mt-1"></ul>
                            </div>

                            <!-- สาขา (Autocomplete) -->
                            <div class="relative">
                                <label for="branch" class="block text-sm font-medium text-gray-700 mb-1">สาขา <span class="text-red-500">*</span></label>
                                <input type="text" id="branch" required placeholder="พิมพ์ค้นหา หรือ ระบุเอง..."
                                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-brand-500 focus:border-brand-500 outline-none pr-10"
                                    autocomplete="off" oninput="filterOptions('branch')" onfocus="showOptions('branch')">
                                <ul id="list-branch" class="dropdown-list absolute z-20 w-full bg-white border border-gray-200 rounded-md shadow-lg max-h-48 overflow-y-auto hidden mt-1"></ul>
                            </div>
                        </div>
                    </div>

                    <!-- Section 2: Risk Details -->
                    <div class="bg-gray-50 p-4 rounded-lg border border-gray-100">
                        <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-4">รายละเอียดความเสี่ยง</h3>
                        <div class="space-y-4">
                            <div>
                                <label for="riskLocation" class="block text-sm font-medium text-gray-700 mb-1">จุดที่พบความเสี่ยง <span class="text-red-500">*</span></label>
                                <input type="text" id="riskLocation" required placeholder="เช่น แผนกA พื้นที่B ระบุสถานที่ให้ชัดเจน"
                                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-brand-500 focus:border-brand-500 outline-none transition-shadow">
                            </div>
                            <div>
                                <label for="riskDescription" class="block text-sm font-medium text-gray-700 mb-1">อธิบายรายละเอียด <span class="text-red-500">*</span></label>
                                <textarea id="riskDescription" required rows="3" placeholder="ลักษณะของปัญหา หรือความรุนแรง..."
                                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-brand-500 focus:border-brand-500 outline-none transition-shadow resize-none"></textarea>
                            </div>
                            <div>
                                <label for="solution" class="block text-sm font-medium text-gray-700 mb-1">แนวทางการแก้ไข <span class="text-red-500">*</span></label>
                                <textarea id="solution" required rows="3" placeholder="อธิบายแนวทางการแก้ไขเบื้องต้น หรือวิธีป้องกัน..."
                                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-brand-500 focus:border-brand-500 outline-none transition-shadow resize-none"></textarea>
                            </div>

                            <!-- Status & Responsibility -->
                            <div class="bg-white p-4 rounded border border-gray-200 space-y-3">
                                <label class="block text-sm font-medium text-gray-700">สถานะการแก้ไข/ผู้รับผิดชอบ <span class="text-red-500">*</span></label>
                                <div class="flex flex-col sm:flex-row gap-4">
                                    <label class="flex items-center space-x-2 cursor-pointer">
                                        <input type="radio" name="status" value="resolved" onchange="toggleResponsibility('resolved')" class="w-4 h-4 text-brand-600 focus:ring-brand-500 border-gray-300">
                                        <span class="text-sm text-gray-700">ดำเนินการแก้ไขได้ด้วยตนเอง</span>
                                    </label>
                                    <label class="flex items-center space-x-2 cursor-pointer">
                                        <input type="radio" name="status" value="pending" onchange="toggleResponsibility('pending')" class="w-4 h-4 text-brand-600 focus:ring-brand-500 border-gray-300" checked>
                                        <span class="text-sm text-gray-700">ให้แผนก/ผู้รับผิดชอบแก้ไข</span>
                                    </label>
                                </div>
                                <div id="assigneeContainer" class="mt-2">
                                    <input type="text" id="assignee" placeholder="ระบุชื่อแผนก หรือ ผู้รับผิดชอบ (เช่น ฝ่ายซ่อมบำรุง)"
                                        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-brand-500 focus:border-brand-500 outline-none transition-shadow">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Section 3: Photos -->
                    <div class="bg-gray-50 p-4 rounded-lg border border-gray-100">
                        <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-4">ภาพประกอบ (รองรับไฟล์รูปภาพเท่านั้น)</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div class="border-2 border-dashed border-gray-300 rounded-lg p-4 text-center hover:bg-gray-100 transition-colors">
                                <label class="flex flex-col items-center justify-center text-sm font-medium text-gray-700 mb-2 cursor-pointer">
                                    <svg class="w-6 h-6 text-brand-500 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                    <span>รูปก่อนแก้ไข <span class="text-red-500">*</span></span>
                                </label>
                                <input type="file" id="photoBefore" accept="image/*" class="w-full text-sm text-gray-500" required>
                                <p class="text-xs text-gray-400 mt-2">จำเป็นต้องแนบ</p>
                            </div>
                            <div class="border-2 border-dashed border-gray-300 rounded-lg p-4 text-center hover:bg-gray-100 transition-colors">
                                <label class="flex flex-col items-center justify-center text-sm font-medium text-gray-700 mb-2 cursor-pointer">
                                    <svg class="w-6 h-6 text-green-500 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg>
                                    <span>รูปหลังแก้ไข</span>
                                </label>
                                <input type="file" id="photoAfter" accept="image/*" class="w-full text-sm text-gray-500">
                                <p class="text-xs text-gray-400 mt-2">แนบเมื่อแก้ไขแล้ว</p>
                            </div>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <div class="flex items-center justify-end space-x-4 pt-4 border-t border-gray-200">
                        <div id="statusMessage" class="text-sm font-medium hidden"></div>
                        <button type="submit" id="submitBtn" class="bg-brand-600 hover:bg-brand-700 text-white px-6 py-2.5 rounded-md font-medium transition-colors shadow-sm flex items-center">
                            <span id="submitText">บันทึกข้อมูลแจ้งเหตุ</span>
                            <svg id="loadingSpinner" class="animate-spin ml-2 h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Section: List -->
        <div id="section-list" class="hidden">
            
            <!-- Login / Filter Panel -->
            <div class="bg-white p-6 rounded-xl shadow-md mb-6 border border-gray-100">
                <h2 class="text-lg font-semibold mb-4 text-gray-800 flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                    ระบบเข้าถึงข้อมูล
                </h2>
                <div class="flex flex-col sm:flex-row gap-4 items-end">
                    <div class="w-full sm:w-1/3">
                        <label class="block text-sm font-medium text-gray-700 mb-1">เลือกประเภทผู้ใช้งาน</label>
                        <select id="userRole" onchange="toggleAuthInput()" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-brand-500 focus:border-brand-500 outline-none">
                            <option value="public">บุคคลทั่วไป (ดูข้อมูลสาธารณะ)</option>
                            <option value="user">ผู้แจ้งเหตุ (ดู/แก้ไขรายการตนเอง)</option>
                            <option value="admin">ผู้ดูแลระบบ (ตรวจสอบ/อนุมัติ)</option>
                        </select>
                    </div>
                    <div class="w-full sm:w-1/3 hidden" id="authInputContainer">
                        <label id="authLabel" class="block text-sm font-medium text-gray-700 mb-1">รหัสผ่าน</label>
                        <input type="password" id="authKey" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-brand-500 outline-none">
                    </div>
                    <div class="w-full sm:w-1/3">
                        <button onclick="loadReports()" class="w-full bg-gray-800 hover:bg-gray-900 text-white px-4 py-2 rounded-md font-medium transition-colors flex justify-center items-center">
                            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> ดึงข้อมูล
                        </button>
                    </div>
                </div>
                <div id="loginMessage" class="mt-3 text-sm font-medium text-red-600 hidden"></div>
            </div>

            <!-- Custom Message UI -->
            <div id="customAlert" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
                <div class="bg-white p-6 rounded-xl shadow-2xl max-w-sm w-full mx-4 text-center">
                    <p id="alertMessage" class="text-gray-800 font-medium mb-6"></p>
                    <button onclick="closeAlert()" class="bg-brand-600 hover:bg-brand-700 text-white px-6 py-2 rounded-md transition-colors w-full">ตกลง</button>
                </div>
            </div>

            <!-- List Display -->
            <div id="reportsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Data will be populated here -->
                <div class="col-span-full text-center py-12 text-gray-500 bg-white rounded-xl border border-dashed border-gray-300">
                    กรุณากด "ดึงข้อมูล" เพื่อดูรายการ
                </div>
            </div>
        </div>
    </main>

    <script>
        // =========================================================
        // การตั้งค่า: URL ล่าสุด
        // =========================================================
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw4a8NrrGFMk1ekM-T0Y5aS8mTgOHmHP9KQtB1IRTSP4r4LqbccV8e2agJTnt1My8mI/exec";
        
        let loadedDataOptions = { departments: [], branches: [] };
        let allReports = [];
        
        // ตัวแปรสำหรับการแบ่งหน้า (Pagination)
        let currentPage = 1;
        const itemsPerPage = 10;

        window.onload = () => {
            fetchOptions();
            document.addEventListener('click', function(e) {
                if(e.target.id !== 'department') document.getElementById('list-department').classList.add('hidden');
                if(e.target.id !== 'branch') document.getElementById('list-branch').classList.add('hidden');
            });
        };

        function showAlert(msg) {
            document.getElementById('alertMessage').innerText = msg;
            document.getElementById('customAlert').classList.remove('hidden');
        }

        function closeAlert() {
            document.getElementById('customAlert').classList.add('hidden');
        }

        function switchTab(tab) {
            const btnForm = document.getElementById('tab-form');
            const btnList = document.getElementById('tab-list');
            const secForm = document.getElementById('section-form');
            const secList = document.getElementById('section-list');

            const activeClass = "flex-1 py-2 px-4 rounded-md font-medium text-brand-600 bg-brand-50 transition-colors duration-200 flex items-center justify-center space-x-2";
            const inactiveClass = "flex-1 py-2 px-4 rounded-md font-medium text-gray-500 hover:text-gray-700 hover:bg-gray-50 transition-colors duration-200 flex items-center justify-center space-x-2";

            if (tab === 'form') {
                btnForm.className = activeClass;
                btnList.className = inactiveClass;
                secForm.classList.remove('hidden');
                secList.classList.add('hidden');
            } else {
                btnList.className = activeClass;
                btnForm.className = inactiveClass;
                secList.classList.remove('hidden');
                secForm.classList.add('hidden');
                if (allReports.length === 0) loadReports();
            }
        }

        function toggleResponsibility(status) {
            const assigneeInput = document.getElementById('assignee');
            if (status === 'resolved') {
                assigneeInput.value = 'ดำเนินการแก้ไขด้วยตนเอง';
                assigneeInput.readOnly = true;
                assigneeInput.classList.add('bg-gray-100', 'text-gray-500');
            } else {
                if(assigneeInput.value === 'ดำเนินการแก้ไขด้วยตนเอง') assigneeInput.value = '';
                assigneeInput.readOnly = false;
                assigneeInput.classList.remove('bg-gray-100', 'text-gray-500');
            }
        }

        function toggleAuthInput() {
            const role = document.getElementById('userRole').value;
            const container = document.getElementById('authInputContainer');
            const label = document.getElementById('authLabel');
            const input = document.getElementById('authKey');
            
            input.value = ''; // clear
            
            if (role === 'public') {
                container.classList.add('hidden');
                input.type = 'text';
            } else if (role === 'user') {
                container.classList.remove('hidden');
                label.innerText = 'รหัสพนักงาน (เพื่อดูของตนเอง)';
                input.type = 'text';
            } else if (role === 'admin') {
                container.classList.remove('hidden');
                label.innerText = 'รหัสผ่าน Admin (GBH)';
                input.type = 'password';
            }
        }

        async function fetchOptions() {
            try {
                const res = await fetch(SCRIPT_URL + '?action=getOptions', { redirect: "follow" });
                if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                const data = await res.json();
                if(data.departments) loadedDataOptions.departments = data.departments;
                if(data.branches) loadedDataOptions.branches = data.branches;
            } catch(e) {
                console.warn("Failed to load options");
            }
        }

        function showOptions(type) { filterOptions(type); }

        function filterOptions(type) {
            const ul = document.getElementById(`list-${type}`);
            ul.innerHTML = '';
            const filterText = document.getElementById(type).value;
            const options = loadedDataOptions[type === 'department' ? 'departments' : 'branches'];
            
            const filtered = options.filter(opt => opt.toLowerCase().includes(filterText.toLowerCase()));
            
            if(filtered.length === 0) {
                ul.innerHTML = `<li class="px-4 py-2 text-gray-500 text-sm">พิมพ์เพื่อระบุข้อมูลใหม่...</li>`;
            } else {
                filtered.forEach(opt => {
                    const li = document.createElement('li');
                    li.className = "px-4 py-2 hover:bg-brand-50 cursor-pointer text-sm text-gray-700 transition-colors";
                    li.textContent = opt;
                    li.onmousedown = function() {
                        document.getElementById(type).value = opt;
                        ul.classList.add('hidden');
                    };
                    ul.appendChild(li);
                });
            }
            ul.classList.remove('hidden');
        }

        function compressImage(file, callback) {
            if (!file) return callback(null);
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1000;
                    const MAX_HEIGHT = 1000;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    } else {
                        if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    callback(canvas.toDataURL('image/jpeg', 0.7));
                }
            }
        }

        function setFormStatus(isLoading, msg = "", isError = false) {
            const btn = document.getElementById('submitBtn');
            const text = document.getElementById('submitText');
            const spinner = document.getElementById('loadingSpinner');
            const msgEl = document.getElementById('statusMessage');

            if (isLoading) {
                btn.disabled = true;
                btn.classList.add('opacity-75', 'cursor-not-allowed');
                spinner.classList.remove('hidden');
                text.innerText = "กำลังบันทึก...";
                msgEl.classList.add('hidden');
            } else {
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
                spinner.classList.add('hidden');
                text.innerText = document.getElementById('editReportId').value ? "อัปเดตข้อมูล" : "บันทึกข้อมูลแจ้งเหตุ";
                if (msg) {
                    msgEl.innerText = msg;
                    msgEl.className = `text-sm font-medium ${isError ? 'text-red-600' : 'text-green-600'} block`;
                    setTimeout(() => msgEl.classList.add('hidden'), 5000);
                }
            }
        }

        async function submitForm(e) {
            e.preventDefault();
            const editId = document.getElementById('editReportId').value;
            const isEdit = editId !== "";
            const status = document.querySelector('input[name="status"]:checked').value;
            const assignee = document.getElementById('assignee').value;
            
            if (status === 'pending' && !assignee) {
                showAlert("กรุณาระบุชื่อแผนก หรือ ผู้รับผิดชอบ");
                return;
            }

            setFormStatus(true);
            const photoBeforeFile = document.getElementById('photoBefore').files[0];
            const photoAfterFile = document.getElementById('photoAfter').files[0];

            if (!isEdit && !photoBeforeFile) {
                showAlert("กรุณาแนบรูปก่อนแก้ไข");
                setFormStatus(false);
                return;
            }

            compressImage(photoBeforeFile, (beforeBase64) => {
                compressImage(photoAfterFile, async (afterBase64) => {
                    const payload = {
                        action: isEdit ? 'update' : 'create',
                        id: isEdit ? editId : "R" + Date.now(),
                        date: new Date().toLocaleString('th-TH'),
                        reporterName: document.getElementById('reporterName').value,
                        employeeId: document.getElementById('employeeId').value,
                        department: document.getElementById('department').value,
                        branch: document.getElementById('branch').value,
                        riskTitle: "-", // ยกเลิกช่องนี้แล้ว แต่ส่งค่าให้ระบบทำงานได้กับ Sheet เดิม
                        riskLocation: document.getElementById('riskLocation').value,
                        riskDescription: document.getElementById('riskDescription').value,
                        solution: document.getElementById('solution').value,
                        status: status,
                        assignee: assignee,
                        photoBefore: beforeBase64 || "",
                        photoAfter: afterBase64 || ""
                    };

                    try {
                        const response = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
                        const result = await response.json();

                        if (result.status === "success") {
                            setFormStatus(false, "บันทึกข้อมูลสำเร็จ!", false);
                            document.getElementById('riskForm').reset();
                            document.getElementById('editReportId').value = "";
                            document.getElementById('formTitle').innerHTML = `<svg class="w-6 h-6 mr-2 text-brand-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>รายละเอียดการแจ้งเหตุ`;
                            toggleResponsibility('pending');
                            document.getElementById('photoBefore').required = true;
                            showAlert("ข้อมูลของคุณถูกส่งเข้าระบบเรียบร้อยแล้ว");
                            allReports = []; // ล้างข้อมูลเก่าเพื่อให้โหลดใหม่
                        } else { throw new Error(result.message); }
                    } catch (error) {
                        setFormStatus(false, "เกิดข้อผิดพลาด: " + error.message, true);
                        showAlert("เกิดข้อผิดพลาดในการบันทึกข้อมูล");
                    }
                });
            });
        }

        async function loadReports() {
            const role = document.getElementById('userRole').value;
            const authKey = document.getElementById('authKey').value;
            const msgEl = document.getElementById('loginMessage');
            const container = document.getElementById('reportsContainer');
            
            msgEl.classList.add('hidden');
            currentPage = 1; // เริ่มที่หน้า 1 เสมอเวลาดึงข้อมูลใหม่

            if (role === 'admin' && authKey !== 'GBH') {
                msgEl.innerText = "รหัสแอดมินไม่ถูกต้อง";
                msgEl.classList.remove('hidden');
                return;
            }
            if (role === 'user' && authKey.trim() === '') {
                msgEl.innerText = "กรุณากรอกรหัสพนักงาน";
                msgEl.classList.remove('hidden');
                return;
            }

            container.innerHTML = `<div class="col-span-full text-center py-12 text-gray-500"><svg class="animate-spin inline-block h-8 w-8 text-brand-600 mb-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg><br>กำลังดึงข้อมูล...</div>`;

            try {
                const res = await fetch(SCRIPT_URL + '?action=getReports', { redirect: "follow" });
                const data = await res.json();
                
                if (data.reports) {
                    allReports = data.reports.reverse(); // นำรายการใหม่สุดขึ้นก่อน
                } else {
                    allReports = [];
                }
                
                renderReports(role, authKey);
            } catch (error) {
                container.innerHTML = `<div class="col-span-full text-center py-12 text-red-500 bg-red-50 rounded-xl border border-red-200">ไม่สามารถเชื่อมต่อฐานข้อมูลได้ กรุณาตรวจสอบ URL หรือสิทธิ์การเข้าถึง</div>`;
            }
        }

        function renderReports(role, authKey) {
            const container = document.getElementById('reportsContainer');
            container.innerHTML = '';

            let displayList = [];
            if (role === 'admin') {
                displayList = allReports;
            } else if (role === 'user') {
                displayList = allReports.filter(r => r.publicStatus.includes('Public') || r.employeeId.replace(/'/g, "") === authKey); // ตัด ' ออกก่อนเทียบ
            } else {
                displayList = allReports.filter(r => r.publicStatus.includes('Public'));
            }

            if (displayList.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-12 text-gray-500 bg-gray-50 rounded-xl border border-dashed border-gray-300">ไม่พบข้อมูลการแจ้งเหตุ</div>`;
                return;
            }

            // คำนวณการแบ่งหน้า
            const totalPages = Math.ceil(displayList.length / itemsPerPage);
            if(currentPage > totalPages && totalPages > 0) currentPage = totalPages;
            const startIndex = (currentPage - 1) * itemsPerPage;
            const paginatedList = displayList.slice(startIndex, startIndex + itemsPerPage);

            paginatedList.forEach(report => {
                const isOwner = (role === 'user' && report.employeeId.replace(/'/g, "") === authKey) || role === 'admin';
                const isPendingPublic = !report.publicStatus.includes('Public');
                const statusColor = report.statusText.includes('รอดำเนินการ') ? 'bg-yellow-100 text-yellow-800 border-yellow-200' : 'bg-green-100 text-green-800 border-green-200';
                
                // จัดการหัวข้อ: หากเป็นข้อมูลเก่าที่มีหัวข้อ จะแสดงหัวข้อ / ถ้าเป็นข้อมูลใหม่ จะแสดงสถานที่แทน
                const displayTitle = (report.riskTitle && report.riskTitle !== "-") ? report.riskTitle : `สถานที่: ${report.riskLocation || '-'}`;
                
                let html = `
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden hover:shadow-md transition-shadow flex flex-col h-full">
                    <div class="p-4 border-b border-gray-100 bg-gray-50 flex justify-between items-start">
                        <div>
                            <span class="text-xs font-semibold text-gray-500 block mb-1">${report.date}</span>
                            <h3 class="font-bold text-gray-800 text-lg">${displayTitle}</h3>
                        </div>
                        <span class="px-2 py-1 text-xs font-medium rounded-full ${statusColor} border text-center leading-tight max-w-[120px]">${report.statusText}</span>
                    </div>
                    
                    <div class="p-4 flex-grow space-y-3 text-sm text-gray-600">
                        <div class="bg-gray-50 p-3 rounded-md border border-gray-100">
                            <span class="font-bold text-gray-700 block mb-1">จุดที่พบความเสี่ยง:</span>
                            ${report.riskLocation || '-'}
                        </div>
                        <div class="bg-gray-50 p-3 rounded-md border border-gray-100">
                            <span class="font-bold text-gray-700 block mb-1">ปัญหา/รายละเอียด:</span>
                            ${report.riskDescription}
                        </div>
                        <div class="bg-blue-50 p-3 rounded-md border border-blue-100 text-blue-800">
                            <span class="font-bold block mb-1">แนวทางการแก้ไข:</span>
                            ${report.solution || '-'}
                        </div>
                        <div class="grid grid-cols-2 gap-2 mt-2">
                            <div><span class="font-medium text-gray-700">ผู้แจ้ง:</span> ${report.reporterName}</div>
                            <div><span class="font-medium text-gray-700">แผนก:</span> ${report.department}</div>
                            <div><span class="font-medium text-gray-700">ผู้รับผิดชอบ:</span> ${report.assignee || '-'}</div>
                            <div>
                                <span class="font-medium text-gray-700">การมองเห็น:</span> 
                                <span class="${isPendingPublic ? 'text-red-500' : 'text-green-500'} font-medium flex items-center mt-1">
                                    ${isPendingPublic ? '<svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg> ส่วนตัว' : '<svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg> สาธารณะ'}
                                </span>
                            </div>
                        </div>

                        <!-- Photos (Direct Display) -->
                        <div class="grid grid-cols-2 gap-3 mt-4 pt-4 border-t border-gray-100">
                            <div>
                                <span class="text-xs font-semibold text-brand-600 mb-1 flex items-center"><svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg> รูปก่อนแก้ไข</span>
                                ${report.photoBefore ? `<a href="${report.photoBefore}" target="_blank"><img src="${report.photoBefore}" class="w-full h-40 object-cover rounded-md border border-gray-200 hover:opacity-90 transition-opacity" alt="Before"></a>` : '<div class="w-full h-40 bg-gray-50 rounded-md border border-dashed border-gray-200 flex items-center justify-center text-xs text-gray-400">ไม่มีรูปภาพ</div>'}
                            </div>
                            <div>
                                <span class="text-xs font-semibold text-green-600 mb-1 flex items-center"><svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg> รูปหลังแก้ไข</span>
                                ${report.photoAfter ? `<a href="${report.photoAfter}" target="_blank"><img src="${report.photoAfter}" class="w-full h-40 object-cover rounded-md border border-gray-200 hover:opacity-90 transition-opacity" alt="After"></a>` : '<div class="w-full h-40 bg-gray-50 rounded-md border border-dashed border-gray-200 flex items-center justify-center text-xs text-gray-400">ยังไม่มีรูปภาพ</div>'}
                            </div>
                        </div>
                    </div>
                `;

                // Actions Footer
                if (isOwner || role === 'admin') {
                    html += `<div class="p-3 bg-gray-50 border-t border-gray-100 flex gap-2">`;
                    
                    if (isOwner) {
                        const safeReport = JSON.stringify(report).replace(/'/g, "\\'").replace(/"/g, '&quot;');
                        html += `<button onclick="editReport('${safeReport}')" class="flex-1 py-1.5 text-sm bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 rounded shadow-sm font-medium transition-colors flex justify-center items-center"><svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg> แก้ไขข้อมูล</button>`;
                    }
                    if (role === 'admin' && isPendingPublic) {
                        html += `<button onclick="approveReport('${report.id}')" class="flex-1 py-1.5 text-sm bg-brand-600 border border-brand-600 text-white hover:bg-brand-700 rounded shadow-sm font-medium transition-colors flex justify-center items-center"><svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> อนุมัติเผยแพร่</button>`;
                    }
                    html += `</div>`;
                }

                html += `</div>`;
                container.innerHTML += html;
            });

            // สร้างปุ่มเปลี่ยนหน้า (Pagination Controls)
            if (totalPages > 1) {
                let paginationHTML = `<div class="col-span-full flex justify-center items-center space-x-4 mt-8 pb-4">`;
                
                // ปุ่มย้อนกลับ
                paginationHTML += `<button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled class="p-2 rounded-md bg-gray-100 text-gray-400 cursor-not-allowed"' : 'class="p-2 rounded-md bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 transition-colors shadow-sm"'}><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg></button>`;
                
                paginationHTML += `<span class="text-sm font-medium text-gray-600">หน้า ${currentPage} จาก ${totalPages}</span>`;
                
                // ปุ่มถัดไป
                paginationHTML += `<button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled class="p-2 rounded-md bg-gray-100 text-gray-400 cursor-not-allowed"' : 'class="p-2 rounded-md bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 transition-colors shadow-sm"'}><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg></button>`;
                
                paginationHTML += `</div>`;
                container.innerHTML += paginationHTML;
            }
        }

        // ฟังก์ชันเปลี่ยนหน้า
        function changePage(newPage) {
            currentPage = newPage;
            const role = document.getElementById('userRole').value;
            const authKey = document.getElementById('authKey').value;
            renderReports(role, authKey);
            window.scrollTo({ top: document.getElementById('section-list').offsetTop - 20, behavior: 'smooth' });
        }

        function editReport(reportStr) {
            const r = JSON.parse(reportStr.replace(/&quot;/g, '"'));
            
            switchTab('form');
            document.getElementById('formTitle').innerHTML = `<svg class="w-6 h-6 mr-2 text-brand-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg> อัปเดตข้อมูลแจ้งเหตุ: ${r.id}`;
            document.getElementById('editReportId').value = r.id;
            
            document.getElementById('reporterName').value = r.reporterName;
            document.getElementById('employeeId').value = r.employeeId.replace(/'/g, ""); // เอา ' ออกก่อนแสดงผล
            document.getElementById('department').value = r.department;
            document.getElementById('branch').value = r.branch;
            document.getElementById('riskLocation').value = r.riskLocation || '';
            document.getElementById('riskDescription').value = r.riskDescription;
            document.getElementById('solution').value = r.solution || '';
            document.getElementById('assignee').value = r.assignee;
            
            const isResolved = r.statusText.includes('ดำเนินการแก้ไขได้ด้วยตนเอง');
            document.querySelector(`input[name="status"][value="${isResolved ? 'resolved' : 'pending'}"]`).checked = true;
            toggleResponsibility(isResolved ? 'resolved' : 'pending');

            document.getElementById('photoBefore').required = false;
            
            window.scrollTo(0, 0);
            showAlert("กรุณาแก้ไขข้อมูลและแนบรูปภาพใหม่หากต้องการ จากนั้นกดบันทึก");
        }

        async function approveReport(id) {
            if(!confirm("ต้องการอนุมัติให้รายการนี้แสดงเป็นสาธารณะใช่หรือไม่?")) return;
            try {
                const res = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'approve', id: id })
                });
                const result = await res.json();
                if(result.status === 'success') {
                    showAlert("อนุมัติสำเร็จ!");
                    allReports = [];
                    loadReports();
                } else { showAlert("เกิดข้อผิดพลาด: " + result.message); }
            } catch(e) { showAlert("เกิดข้อผิดพลาดในการเชื่อมต่อ"); }
        }
    </script>
